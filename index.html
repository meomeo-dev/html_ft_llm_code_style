<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 代码风格调优器</title>
        <style>
        :root {
            --color-bg: #FEFDFB;
            --color-surface: #FFFFFF;
            --color-surface-alt: #F7F9F8;
            --color-text: #252A32;
            --color-text-secondary: #5B626B;
            --color-text-tertiary: #8D949C;
            --color-accent: #3080E0;
            --color-accent-deep: #1F6FC8;
            --color-accent-soft: #D0E0F8;
            --color-mint: #58B7A7;
            --color-mint-soft: #D8F0E8;
            --color-coral: #FF8068;
            --color-coral-soft: #FFE0D8;
            --color-amber: #F6B44A;
            --color-border: #E0E0E0;
            --color-border-strong: #D0D0D0;
            --color-divider: #EDEEEF;
            --color-input-border: #DCDCDC;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 10px;
            --shadow-hairline: 0 1px 1px rgba(45,49,53,0.04);
            --shadow-soft: 0 8px 24px rgba(45,49,53,0.08);
            --shadow-active: 0 10px 28px rgba(48,128,224,0.18);
            --focus-ring: 0 0 0 3px rgba(48,128,224,0.18);
            --easing: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body {
            font-family: Inter, "SF Pro Text", "Segoe UI", system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            background: linear-gradient(135deg, #FFFFFF 0%, #F7F9F8 55%, #F3FAF8 100%);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .main-container {
            max-width: 1300px;
            margin: auto;
            background: var(--color-surface);
            padding: 2rem 2.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-hairline);
        }

        h1 {
            text-align: center;
            color: var(--color-text);
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 0 0 0.3rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--color-divider);
        }

        h1 .accent {
            color: var(--color-accent);
        }

        .subtitle {
            text-align: center;
            color: var(--color-text-tertiary);
            font-size: 0.82rem;
            margin: 0 0 1.8rem;
            font-weight: 400;
        }

        .sliders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .category-header {
            grid-column: 1 / -1;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-accent);
            margin-top: 0.3rem;
            padding: 0.45rem 0.8rem;
            border-left: 3px solid var(--color-accent);
            background: var(--color-accent-soft);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            letter-spacing: 0.02em;
        }

        .dimension-control {
            display: flex;
            flex-direction: column;
            padding: 1rem 1.1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-surface);
            box-shadow: var(--shadow-hairline);
            transition: border-color 0.18s var(--easing), box-shadow 0.18s var(--easing);
        }

        .dimension-control:hover {
            border-color: var(--color-border-strong);
            box-shadow: var(--shadow-soft);
        }

        .dimension-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .dimension-header label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--color-text);
        }

        .dimension-header .value-display {
            font-weight: 600;
            font-size: 1rem;
            color: var(--color-accent);
            min-width: 20px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .dimension-control input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: var(--color-input-border);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .dimension-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #FFFFFF;
            border-radius: 50%;
            border: 2px solid var(--color-mint);
            box-shadow: 0 3px 10px rgba(45,49,53,0.12);
            cursor: pointer;
            transition: border-color 0.18s var(--easing);
        }

        .dimension-control input[type="range"]::-webkit-slider-thumb:hover {
            border-color: var(--color-accent);
        }

        .dimension-control input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #FFFFFF;
            border-radius: 50%;
            border: 2px solid var(--color-mint);
            box-shadow: 0 3px 10px rgba(45,49,53,0.12);
        }

        .description-text {
            margin-top: 0.6rem;
            font-size: 0.78rem;
            color: var(--color-text-tertiary);
            min-height: 2.2em;
            font-style: italic;
        }

        .actions {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        #copyButton {
            padding: 0.65rem 1.5rem;
            font-size: 0.9em;
            font-weight: 600;
            color: #FFFFFF;
            background: linear-gradient(180deg, #3B8BE8 0%, #1F6FC8 100%);
            border: 1px solid var(--color-accent-deep);
            border-radius: var(--radius-sm);
            cursor: pointer;
            box-shadow: var(--shadow-active);
            transition: opacity 0.18s var(--easing), box-shadow 0.18s var(--easing);
            font-family: inherit;
        }

        #copyButton:hover {
            opacity: 0.92;
        }

        #copyButton:active {
            box-shadow: var(--shadow-hairline);
        }

        #copyButton:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring), 0 10px 28px rgba(48,128,224,0.18);
        }

        #copyMessage {
            margin-left: 1rem;
            color: var(--color-mint);
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.5s;
            font-size: 0.85rem;
        }

        #yamlOutput {
            width: 100%;
            height: 320px;
            font-family: "SF Mono", "Fira Code", "JetBrains Mono", Menlo, Consolas, monospace;
            font-size: 0.78rem;
            background: var(--color-surface-alt);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 1.2rem;
            box-sizing: border-box;
            white-space: pre;
            overflow-x: auto;
            color: var(--color-text-secondary);
            resize: vertical;
        }

        #yamlOutput:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: var(--focus-ring);
        }

        .presets {
            text-align: center;
            margin: 0.5rem 0 1.4rem;
        }

        .preset-button {
            padding: 0.4rem 0.95rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--color-text);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin: 0 0.2rem 0.5rem;
            box-shadow: var(--shadow-hairline);
            transition: all 0.18s var(--easing);
            font-family: inherit;
        }

        .preset-button:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            box-shadow: var(--shadow-soft);
        }

        .preset-button:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .preset-button.active {
            background: var(--color-mint-soft);
            border-color: var(--color-mint);
            color: #157F73;
            font-weight: 600;
        }

        #presetStatus {
            text-align: center;
            color: var(--color-text-tertiary);
            font-size: 0.73rem;
            margin: 0.4rem 0 0;
            min-height: 1.1em;
            transition: color 0.3s;
        }

        #presetStatus.flash {
            color: var(--color-mint);
        }

        .quick-presets {
            display: inline-flex;
            gap: 0.35rem;
            margin-left: 1rem;
            vertical-align: middle;
        }
        .quick-preset-btn {
            padding: 0.3rem 0.65rem;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--color-text-secondary);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s var(--easing);
            font-family: inherit;
            white-space: nowrap;
        }
        .quick-preset-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background: var(--color-accent-soft);
        }
        .quick-preset-btn:active {
            background: var(--color-mint-soft);
            border-color: var(--color-mint);
            color: #157F73;
        }
        .quick-preset-btn.active {
            background: var(--color-mint-soft);
            border-color: var(--color-mint);
            color: #157F73;
            font-weight: 600;
        }
        .quick-preset-label {
            font-size: 0.7rem;
            color: var(--color-text-tertiary);
            margin: 0 0.15rem;
        }
        @media (max-width: 600px) {
            .quick-presets { display: flex; flex-wrap: wrap; justify-content: center; margin: 0.5rem 0 0; }
        }

        .preset-label {
            text-align: center;
            color: var(--color-text-tertiary);
            font-size: 0.7rem;
            margin: 0 0 0.3rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .main-container { padding: 1.2rem; border-radius: var(--radius-sm); }
            .sliders-grid { grid-template-columns: 1fr; }
            .preset-button { display: block; width: 100%; margin: 0.3rem 0; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>&lt;<span class="accent">/</span>&gt; AI 代码风格调优器</h1>
        <p class="subtitle">Code Style Tuner &mdash; 50 维度 / 10 分组 / 0&ndash;5 量表</p>

        <div class="presets">
            <div class="preset-label">Presets</div>
            <button class="preset-button active" id="presetStrict">严格工程</button>
            <button class="preset-button" id="presetPragmatic">实用平衡</button>
            <button class="preset-button" id="presetPrototype">快速原型</button>
            <button class="preset-button" id="presetLibrary">开源库作者</button>
            <button class="preset-button" id="presetEnterprise">企业级</button>
        </div>
        <div id="presetStatus">当前预设：严格工程</div>

        <div class="sliders-grid" id="sliders-grid"></div>

        <div class="actions">
            <button id="copyButton">复制当前 YAML</button>
            <span id="copyMessage">已复制!</span>
            <span class="quick-preset-label">预设：</span>
            <span class="quick-presets">
                <button class="quick-preset-btn" id="quickPresetStrict">严格工程</button>
                <button class="quick-preset-btn" id="quickPresetPragmatic">实用平衡</button>
                <button class="quick-preset-btn" id="quickPresetPrototype">快速原型</button>
                <button class="quick-preset-btn" id="quickPresetLibrary">开源库作者</button>
                <button class="quick-preset-btn" id="quickPresetEnterprise">企业级</button>
            </span>
        </div>

        <textarea id="yamlOutput" readonly></textarea>
    </div>

    <script>
    const dimensionsData = [
        {
                "id": "indentationStyle",
                "category": "formatting",
                "name": "缩进风格一致性 (Indentation Style Consistency)",
                "descriptions": [
                        "不强制缩进，允许 Tab 与空格混用，甚至同一文件内混合",
                        "单个文件内缩进字符一致（全 Tab 或全空格），但不同文件间可能不同",
                        "项目内统一缩进字符（Tab 或空格），但缩进宽度未强制（如 Tab 宽度可因人而异，或空格数未统一）",
                        "项目内统一缩进字符且固定宽度（空格数明确为 2/4/8；若使用 Tab，视觉宽度仍可能因编辑器设置而异）",
                        "通过 linter 静态检测缩进不一致并发出警告，违规需人工修复",
                        "通过格式化器自动修复所有缩进违规，无需人工干预，零容忍不一致"
                ]
        },
        {
                "id": "lineLengthLimit",
                "category": "formatting",
                "name": "行宽限制 (Line Length Limit)",
                "descriptions": [
                        "无行宽限制，代码中各行长度差异悬殊，同一文件中可同时看到极短行与数百字符的超长行，阅读时需要频繁水平滚动",
                        "存在团队约定值（如100字符），多数行自然收敛于约定值附近，但偶见明显超长行，阅读体验在多数区域流畅、局部中断",
                        "超长行在编辑器中以警告标记（如波浪线）标识，阅读时可感知哪些行偏离了约定，但不强制修正，视觉一致性有限",
                        "超长行在编辑器中以强视觉标记（如红色背景）显著高亮，阅读时偏离行不可忽视；或在代码评审中自动标记，推动修正但未阻断合入",
                        "硬限制生效，CI阻断超长行合入，仓库中所有行均在限制值内，阅读无需水平滚动，视觉流整齐一致",
                        "除硬限制外，换行位置由格式化工具自动优化，行长度分布更均匀，且团队无需在换行决策上消耗精力，视觉统一性达到最高"
                ]
        },
        {
                "id": "whitespaceBracing",
                "category": "formatting",
                "name": "空格与括号风格 (Whitespace & Brace Style)",
                "descriptions": [
                        "不关心空格与括号风格，允许混用",
                        "必须统一函数花括号的换行风格（项目配置为 Allman 或 K&R，全局一致）",
                        "所有花括号（if/for/while/try 等控制流及对象字面量）必须采用与函数相同的换行风格",
                        "二元运算符两侧必须有一个空格（如 a + b），一元运算符与操作数间不加空格（如 !flag）",
                        "对象、数组、导入/导出等属性内不得出现多余空格（如 {key: value}，花括号内侧无空格，冒号后一个空格）",
                        "所有空格和括号风格遵循统一的可配置规则集，任何违反项均视为警告"
                ]
        },
        {
                "id": "namingCasing",
                "category": "naming",
                "name": "命名大小写规范 (Naming Casing Convention)",
                "descriptions": [
                        "屏幕上标识符的大小写与分隔符无任何规律，驼峰、下划线、连字符等样式随机出现，无法从命名外观判断标识符的任何属性",
                        "屏幕上所有标识符呈现统一的视觉模式——要么全部采用同一种单词连接方式（如全小写点号分隔、全小驼峰、全蛇形下划线或全连字符分隔），虽未区分类型，但整体视觉一致",
                        "屏幕上不同类型标识符的命名外观有明显视觉差异，可仅凭大小写与分隔符就将类、函数、变量、常量区分开，但具体哪种类型采用哪种样式项目可自行选择",
                        "屏幕上各类标识符的命名外观与该语言社区广泛使用的风格一致——使有该语言经验的开发者可凭视觉快速识别标识符类型，少数例外需标注说明原因",
                        "屏幕上所有标识符的命名外观与项目明确选定的语言风格指南（如 PEP 8、Google Java Style Guide、Airbnb JS Style Guide）完全匹配，任何因外部约束造成的不可避免偏离均在注释或抑制规则中显式记录",
                        "命名外观的一致性由静态分析工具自动检查，任何未记录或未经批准的偏离都会在提交或构建阶段被自动阻断，屏幕上不会出现不可解释的命名风格异常"
                ]
        },
        {
                "id": "variableNamingDescriptiveness",
                "category": "naming",
                "name": "变量命名描述性 (Variable Naming Descriptiveness)",
                "descriptions": [
                        "单字母或占位符名（如 i, x, tmp），1-3 字符，无分隔符，视觉上几乎不可见，完全无描述性",
                        "极简缩写（如 cnt, idx, msg），3-5 字符，仅局部可读，需额外解码才能理解含义",
                        "单个完整单词（如 count, index, name），5-10 字符，具备基本含义，视觉上形成一个紧凑的语义单元",
                        "清晰的双词复合名称（如 userCount, isActive），10-18 字符，出现第一个驼峰转折点，意图明显且简短",
                        "描述性多词短语，带必要限定词（如 numberOfActiveUsers, maxRetryCount），15-25 字符，2-3 个驼峰转折，视觉上构成完整短语块",
                        "精准上下文命名，包含一个关键范围限定或单位后缀（如 activeUserCountInSession, elapsedTimeMs），18-28 字符，视觉上为精炼的完整短句，信息密度最高但避免冗余修饰"
                ]
        },
        {
                "id": "functionNamingVerbosity",
                "category": "naming",
                "name": "函数/方法命名详细度 (Function/Method Naming Verbosity)",
                "descriptions": [
                        "仅使用单个通用动词或字母，无目标信息（如 do, run, f）",
                        "动词与名词采用缩写或极短形式，视觉紧凑（如 calcTotal, getVal, initCfg）",
                        "动词完整拼写，名词为泛化词，未揭示业务含义（如 calculateTotal, processData, fetchInfo）",
                        "动词完整拼写，名词具有明确业务含义，不含缩写（如 calculateRevenue, fetchUserList, updateOrderStatus）",
                        "在明确动作与目标基础上，增加最小必要上下文（如 calculateRevenueForYear, fetchUserById）",
                        "名称包含多个动作或多余细节，视觉长度显著超出常规（如 calculateRevenueAndApplyDiscounts, fetchUserAndUpdateCache）"
                ]
        },
        {
                "id": "abbreviationUsage",
                "category": "naming",
                "name": "缩写使用度 (Abbreviation Usage)",
                "descriptions": [
                        "禁止使用任何缩写，所有标识符必须全拼",
                        "极少数通用缩写允许（如 num、msg）",
                        "允许常见领域缩写（如 db、http、api）",
                        "中度使用缩写，代码中常出现（如 conf、ctx、init）",
                        "大量使用简短缩写，长度优先于可读性",
                        "偏好极短缩写，即使影响可读性也在所不惜"
                ]
        },
        {
                "id": "commentDensity",
                "category": "documentation",
                "name": "注释密度 (Comment Density)",
                "descriptions": [
                        "代码中无任何注释行，屏幕所见仅为可执行代码与空行",
                        "代码中偶见零星注释行，仅出现在复杂算法段落附近",
                        "每个函数/方法上方可见一行简短注释，形成规律性的代码-注释交替节奏",
                        "关键逻辑段落前可见注释块，公共接口处可见结构化文档注释，形成清晰的视觉分段",
                        "大部分代码行间穿插注释说明，注释与代码在屏幕上交错分布，视觉密度较高",
                        "注释行数量接近或超过代码行，注释在视觉上占据主导，代码行被大量文字解释环绕"
                ]
        },
        {
                "id": "docblockUsage",
                "category": "documentation",
                "name": "文档块使用 (Docblock / Documentation Block Usage)",
                "descriptions": [
                        "屏幕上看不到任何文档注释块",
                        "偶尔出现单行注释，通常位于函数上方，视觉干扰极小",
                        "公共函数上方出现简洁的多行注释块，代码中开始出现规律的注释-代码视觉模式",
                        "公共函数上方的注释块明显增大，包含多行标签，纵向空间占用增加",
                        "几乎所有函数（包括私有）上方都有多行注释块，注释-代码模式密集且普遍",
                        "每个函数上方都有结构规整的多行注释块，块内包含标签、列表等丰富视觉元素，整体注释密度最高"
                ]
        },
        {
                "id": "todoUsage",
                "category": "documentation",
                "name": "TODO/FIXME 使用频率 (TODO/FIXME Usage)",

    const slidersGrid = document.getElementById('sliders-grid');

    function clamp(v, min, max) { return Math.max(min, Math.min(max, Number(v))); }
    function getDim(id) { return dimensionsData.find(d => d.id === id); }
    function getSliderEl(id) { return document.getElementById(id + '-slider'); }
    function getValue(id) { return clamp(getSliderEl(id).value, 0, 5); }
    function updateUIFor(id) {
        const val = getValue(id);
        const valEl = document.getElementById(id + '-value');
        if (valEl) valEl.textContent = String(val);
        const dim = getDim(id);
        if (dim) {
            const descEl = document.getElementById(id + '-desc');
            if (descEl) descEl.textContent = dim.descriptions[val];
        }
    }
    function setSliderValue(id, value) {
        const el = getSliderEl(id);
        if (!el) return;
        el.value = clamp(value, 0, 5);
        updateUIFor(id);
    }

    function renderSliders() {
        categories.forEach(cat => {
            const headerDiv = document.createElement('div');
            headerDiv.className = 'category-header';
            headerDiv.textContent = cat.name;
            slidersGrid.appendChild(headerDiv);
            cat.dimensions.forEach(id => {
                const dim = getDim(id);
                if (!dim) return;
                const controlDiv = document.createElement('div');
                controlDiv.className = 'dimension-control';
                controlDiv.innerHTML =
                    '<div class="dimension-header">' +
                    '<label for="' + dim.id + '-slider">' + dim.name + '</label>' +
                    '<span class="value-display" id="' + dim.id + '-value">3</span>' +
                    '</div>' +
                    '<input type="range" id="' + dim.id + '-slider" name="' + dim.id + '" min="0" max="5" value="3" step="1">' +
                    '<p class="description-text" id="' + dim.id + '-desc">' + dim.descriptions[3] + '</p>';
                slidersGrid.appendChild(controlDiv);
            });
        });
    }

    function generateYaml() {
        let yaml = '[待优化的提示词 开始]# 你的代码风格\n\n量表统一：0-5 离散档，默认中位值3，便于用户微调一到两档即可感知差异。\n\n你的代码风格应满足如下设定（按分组展示）：\n\n';
        categories.forEach(cat => {
            yaml += '- 分组: "' + cat.name + '"\n';
            yaml += '  id: "' + cat.id + '"\n';
            yaml += '  维度:\n';
            cat.dimensions.forEach(id => {
                const dim = getDim(id);
                if (!dim) return;
                const slider = document.getElementById(dim.id + '-slider');
                if (!slider) return;
                const score = slider.value;
                const description = dim.descriptions[score];
                yaml += '    - 名称: "' + dim.name + '"\n';
                yaml += '      分数: ' + score + '\n';
                yaml += '      值说明: "' + description + '"\n';
            });
        });
        yaml += '\n\n[待优化的提示词 结束]\n\n重写为一段连续书写的提示词(不是结构化写作), 前缀为"你的Code个性是".\n\n';
        return yaml;
    }

    function updateYamlOutput() {
        yamlOutput.textContent = generateYaml();
    }

    function copyYaml() {
        navigator.clipboard.writeText(generateYaml()).then(() => {
            copyMessage.style.opacity = '1';
            setTimeout(() => { copyMessage.style.opacity = '0'; }, 2000);
        }).catch(err => {
            alert('复制失败，请手动复制。');
        });
    }


    function handleSliderInput(event) {
        if (event.target.type === 'range') {
            const id = event.target.name;
            updateUIFor(id);
            updateYamlOutput();
        }
    }

            commentDensity: 2, docblockUsage: 3, todoUsage: 2, inlineCommentStyle: 2, fileHeaderComment: 2,
            functionLength: 2, fileLength: 2, nestingDepth: 3, cyclomaticComplexity: 3, singleResponsibility: 3, moduleOrganization: 3,
            parameterCount: 2, memberOrdering: 2,
            errorPropagation: 3, exceptionUsage: 2, nullHandling: 3, loggingLevel: 3, defensiveAssertion: 2,
            testCoverage: 3, testIsolation: 3, assertionStyle: 2, mockingStyle: 3,
            algorithmicEfficiency: 2, prematureOptimization: 2, resourceManagement: 2, memoryManagement: 2,
            threadSafety: 2, asyncPattern: 2, inputValidation: 3, outputSanitization: 3,

            algorithmicEfficiency: 0, prematureOptimization: 0, resourceManagement: 0, memoryManagement: 0,
            threadSafety: 0, asyncPattern: 0, inputValidation: 0, outputSanitization: 0,

            magicNumbers: 0, comparisonOrdering: 0

            threadSafety: 3, asyncPattern: 3, inputValidation: 4, outputSanitization: 4,

            dependencyInjection: 5, interfaceAbstraction: 5, designPatternUsage: 3, codeReusability: 5,
            magicNumbers: 5, comparisonOrdering: 5
        }
    };

    const presetDisplayNames = {
        strict: '严格工程 (Strict Engineering)',
        pragmatic: '实用平衡 (Pragmatic Balance)',
        prototype: '快速原型 (Rapid Prototyping)',
        library: '开源库作者 (Library Author)',
        enterprise: '企业级 (Enterprise Grade)'
    };

    function applyPreset(key) {
        const cfg = presets[key];
        if (!cfg) return;
        Object.entries(cfg).forEach(([id, val]) => {
            setSliderValue(id, val);
        });
        updateYamlOutput();
        updatePresetStatus(key);
    }

    function updatePresetStatus(key) {
        // Update active button
        document.querySelectorAll('.preset-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.quick-preset-btn').forEach(btn => btn.classList.remove('active'));
        const btnMap = { strict: 'presetStrict', pragmatic: 'presetPragmatic', prototype: 'presetPrototype', library: 'presetLibrary', enterprise: 'presetEnterprise' };
        const quickBtnMap = { strict: 'quickPresetStrict', pragmatic: 'quickPresetPragmatic', prototype: 'quickPresetPrototype', library: 'quickPresetLibrary', enterprise: 'quickPresetEnterprise' };
        const activeBtn = document.getElementById(btnMap[key]);
        if (activeBtn) activeBtn.classList.add('active');
        const activeQuickBtn = document.getElementById(quickBtnMap[key]);
        if (activeQuickBtn) activeQuickBtn.classList.add('active');
        // Update status text
        const statusEl = document.getElementById('presetStatus');
        if (statusEl) {
            const name = presetDisplayNames[key] || key;
            statusEl.textContent = '当前预设：' + name;
            statusEl.classList.remove('flash');
            void statusEl.offsetWidth;
            statusEl.classList.add('flash');
        }
    }

    // Init
    renderSliders();
    updateYamlOutput();

    slidersGrid.addEventListener('input', handleSliderInput);
    copyButton.addEventListener('click', copyYaml);

    document.getElementById('presetStrict').addEventListener('click', () => applyPreset('strict'));
    document.getElementById('presetPragmatic').addEventListener('click', () => applyPreset('pragmatic'));
    document.getElementById('presetPrototype').addEventListener('click', () => applyPreset('prototype'));
    document.getElementById('presetLibrary').addEventListener('click', () => applyPreset('library'));
    document.getElementById('presetEnterprise').addEventListener('click', () => applyPreset('enterprise'));

    // Quick-preset copy buttons
    document.getElementById('quickPresetStrict').addEventListener('click', () => applyPreset('strict'));
    document.getElementById('quickPresetPragmatic').addEventListener('click', () => applyPreset('pragmatic'));
    document.getElementById('quickPresetPrototype').addEventListener('click', () => applyPreset('prototype'));
    document.getElementById('quickPresetLibrary').addEventListener('click', () => applyPreset('library'));
    document.getElementById('quickPresetEnterprise').addEventListener('click', () => applyPreset('enterprise'));
    </script>
