<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 代码风格调优器</title>
        <style>
        :root {
            --color-bg: #FEFDFB;
            --color-surface: #FFFFFF;
            --color-surface-alt: #F7F9F8;
            --color-text: #252A32;
            --color-text-secondary: #5B626B;
            --color-text-tertiary: #8D949C;
            --color-accent: #3080E0;
            --color-accent-deep: #1F6FC8;
            --color-accent-soft: #D0E0F8;
            --color-mint: #58B7A7;
            --color-mint-soft: #D8F0E8;
            --color-coral: #FF8068;
            --color-coral-soft: #FFE0D8;
            --color-amber: #F6B44A;
            --color-border: #E0E0E0;
            --color-border-strong: #D0D0D0;
            --color-divider: #EDEEEF;
            --color-input-border: #DCDCDC;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 10px;
            --shadow-hairline: 0 1px 1px rgba(45,49,53,0.04);
            --shadow-soft: 0 8px 24px rgba(45,49,53,0.08);
            --shadow-active: 0 10px 28px rgba(48,128,224,0.18);
            --focus-ring: 0 0 0 3px rgba(48,128,224,0.18);
            --easing: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body {
            font-family: Inter, "SF Pro Text", "Segoe UI", system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            background: linear-gradient(135deg, #FFFFFF 0%, #F7F9F8 55%, #F3FAF8 100%);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .main-container {
            max-width: 1300px;
            margin: auto;
            background: var(--color-surface);
            padding: 2rem 2.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-hairline);
        }

        h1 {
            text-align: center;
            color: var(--color-text);
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 0 0 0.3rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--color-divider);
        }

        h1 .accent {
            color: var(--color-accent);
        }

        .subtitle {
            text-align: center;
            color: var(--color-text-tertiary);
            font-size: 0.82rem;
            margin: 0 0 1.8rem;
            font-weight: 400;
        }

        .sliders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .category-header {
            grid-column: 1 / -1;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-accent);
            margin-top: 0.3rem;
            padding: 0.45rem 0.8rem;
            border-left: 3px solid var(--color-accent);
            background: var(--color-accent-soft);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            letter-spacing: 0.02em;
        }

        .dimension-control {
            display: flex;
            flex-direction: column;
            padding: 1rem 1.1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-surface);
            box-shadow: var(--shadow-hairline);
            transition: border-color 0.18s var(--easing), box-shadow 0.18s var(--easing);
        }

        .dimension-control:hover {
            border-color: var(--color-border-strong);
            box-shadow: var(--shadow-soft);
        }

        .dimension-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .dimension-header label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--color-text);
        }

        .dimension-header .value-display {
            font-weight: 600;
            font-size: 1rem;
            color: var(--color-accent);
            min-width: 20px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .dimension-control input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: var(--color-input-border);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .dimension-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #FFFFFF;
            border-radius: 50%;
            border: 2px solid var(--color-mint);
            box-shadow: 0 3px 10px rgba(45,49,53,0.12);
            cursor: pointer;
            transition: border-color 0.18s var(--easing);
        }

        .dimension-control input[type="range"]::-webkit-slider-thumb:hover {
            border-color: var(--color-accent);
        }

        .dimension-control input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #FFFFFF;
            border-radius: 50%;
            border: 2px solid var(--color-mint);
            box-shadow: 0 3px 10px rgba(45,49,53,0.12);
        }

        .description-text {
            margin-top: 0.6rem;
            font-size: 0.78rem;
            color: var(--color-text-tertiary);
            min-height: 2.2em;
            font-style: italic;
        }

        .actions {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        #copyButton {
            padding: 0.65rem 1.5rem;
            font-size: 0.9em;
            font-weight: 600;
            color: #FFFFFF;
            background: linear-gradient(180deg, #3B8BE8 0%, #1F6FC8 100%);
            border: 1px solid var(--color-accent-deep);
            border-radius: var(--radius-sm);
            cursor: pointer;
            box-shadow: var(--shadow-active);
            transition: opacity 0.18s var(--easing), box-shadow 0.18s var(--easing);
            font-family: inherit;
        }

        #copyButton:hover {
            opacity: 0.92;
        }

        #copyButton:active {
            box-shadow: var(--shadow-hairline);
        }

        #copyButton:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring), 0 10px 28px rgba(48,128,224,0.18);
        }

        #copyMessage {
            margin-left: 1rem;
            color: var(--color-mint);
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.5s;
            font-size: 0.85rem;
        }

        #yamlOutput {
            width: 100%;
            height: 320px;
            font-family: "SF Mono", "Fira Code", "JetBrains Mono", Menlo, Consolas, monospace;
            font-size: 0.78rem;
            background: var(--color-surface-alt);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 1.2rem;
            box-sizing: border-box;
            white-space: pre;
            overflow-x: auto;
            color: var(--color-text-secondary);
            resize: vertical;
        }

        #yamlOutput:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: var(--focus-ring);
        }

        .presets {
            text-align: center;
            margin: 0.5rem 0 1.4rem;
        }

        .preset-button {
            padding: 0.4rem 0.95rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--color-text);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin: 0 0.2rem 0.5rem;
            box-shadow: var(--shadow-hairline);
            transition: all 0.18s var(--easing);
            font-family: inherit;
        }

        .preset-button:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            box-shadow: var(--shadow-soft);
        }

        .preset-button:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .preset-button.active {
            background: var(--color-mint-soft);
            border-color: var(--color-mint);
            color: #157F73;
            font-weight: 600;
        }

        #presetStatus {
            text-align: center;
            color: var(--color-text-tertiary);
            font-size: 0.73rem;
            margin: 0.4rem 0 0;
            min-height: 1.1em;
            transition: color 0.3s;
        }

        #presetStatus.flash {
            color: var(--color-mint);
        }

        .quick-presets {
            display: inline-flex;
            gap: 0.35rem;
            margin-left: 1rem;
            vertical-align: middle;
        }
        .quick-preset-btn {
            padding: 0.3rem 0.65rem;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--color-text-secondary);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s var(--easing);
            font-family: inherit;
            white-space: nowrap;
        }
        .quick-preset-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background: var(--color-accent-soft);
        }
        .quick-preset-btn:active {
            background: var(--color-mint-soft);
            border-color: var(--color-mint);
            color: #157F73;
        }
        .quick-preset-btn.active {
            background: var(--color-mint-soft);
            border-color: var(--color-mint);
            color: #157F73;
            font-weight: 600;
        }
        .quick-preset-label {
            font-size: 0.7rem;
            color: var(--color-text-tertiary);
            margin: 0 0.15rem;
        }
        @media (max-width: 600px) {
            .quick-presets { display: flex; flex-wrap: wrap; justify-content: center; margin: 0.5rem 0 0; }
        }

        .preset-label {
            text-align: center;
            color: var(--color-text-tertiary);
            font-size: 0.7rem;
            margin: 0 0 0.3rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .main-container { padding: 1.2rem; border-radius: var(--radius-sm); }
            .sliders-grid { grid-template-columns: 1fr; }
            .preset-button { display: block; width: 100%; margin: 0.3rem 0; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>&lt;<span class="accent">/</span>&gt; AI 代码风格调优器</h1>
        <p class="subtitle">Code Style Tuner &mdash; 50 维度 / 7 分组 / 0&ndash;5 代码风格量表</p>

        <div class="presets">
            <div class="preset-label">Presets</div>
            <button class="preset-button active" id="presetStrict">规约优先</button>
            <button class="preset-button" id="presetPragmatic">实用平衡</button>
            <button class="preset-button" id="presetPrototype">快速原型</button>
            <button class="preset-button" id="presetLibrary">开源库作者</button>
            <button class="preset-button" id="presetEnterprise">企业级</button>
            <button class="preset-button" id="presetMinimalist">极简派</button>
            <button class="preset-button" id="presetLiterate">说明型作者</button>
        </div>
        <div id="presetStatus">当前预设：规约优先</div>

        <div class="sliders-grid" id="sliders-grid"></div>

        <div class="actions">
            <button id="copyButton">复制当前 YAML</button>
            <span id="copyMessage">已复制!</span>
            <span class="quick-preset-label">预设：</span>
            <span class="quick-presets">
                <button class="quick-preset-btn" id="quickPresetStrict">规约优先</button>
                <button class="quick-preset-btn" id="quickPresetPragmatic">实用平衡</button>
                <button class="quick-preset-btn" id="quickPresetPrototype">快速原型</button>
                <button class="quick-preset-btn" id="quickPresetLibrary">开源库作者</button>
                <button class="quick-preset-btn" id="quickPresetEnterprise">企业级</button>
                <button class="quick-preset-btn" id="quickPresetMinimalist">极简派</button>
                <button class="quick-preset-btn" id="quickPresetLiterate">说明型作者</button>
            </span>
        </div>

        <textarea id="yamlOutput" readonly></textarea>
    </div>

    <script>
    const dimensionsData = [
        {
                "id": "indentationStyle",
                "category": "formattingStyle",
                "name": "缩进样式与宽度 (Indentation Style & Width)",
                "descriptions": [
                        "同一文件内 Tab、空格和不同缩进宽度混在一起，起始列明显不稳定",
                        "单个文件内缩进字符大体一致，但相邻块的缩进宽度偶尔突然变宽或变窄",
                        "多数嵌套层级按同一缩进宽度推进，少数局部仍出现不规则起始列",
                        "每个嵌套层级都以稳定缩进宽度推进，代码左边界形成清楚阶梯",
                        "同类文件的缩进字符和缩进宽度一致，不同文件的缩进层级排列相近",
                        "整份代码使用稳定的缩进规则，嵌套层级的起始列几乎没有突变"
                ]
        },
        {
                "id": "lineLengthDistribution",
                "category": "formattingStyle",
                "name": "行长分布 (Line Length Distribution)",
                "descriptions": [
                        "极短行和超长行随机交错，行长差异很大，常出现需要横向阅读的长行",
                        "多数行较短，但偶尔有长表达式或长调用突然伸到视口右侧",
                        "行长大致收敛在一个宽度区间，仍可见少量明显突出的长行",
                        "长行经常被折成两三行，换行位置相对稳定",
                        "大多数行停在相近长度内，只有少量字符串或注释突破边界",
                        "同一文件内行宽分布均匀，长表达式、参数列表和注释都采用稳定换行方式"
                ]
        },
        {
                "id": "tokenSpacing",
                "category": "formattingStyle",
                "name": "符号间距 (Token Spacing)",
                "descriptions": [
                        "运算符、逗号、冒号和括号周围的空格随机出现或消失，标点贴合度混乱",
                        "主要运算符周围常有空格，但对象、列表或调用参数中的间距仍不稳定",
                        "逗号、冒号和二元运算符附近的空格多数一致，局部仍显得紧或松",
                        "常见符号两侧空格形成固定节奏，代码行中的标点间隔较少突变",
                        "对象、数组、参数列表和表达式中的空格模式在同类结构里反复出现",
                        "同一文件内标点周围的空格规则稳定，紧贴、单空格和换行位置都可预期"
                ]
        },
        {
                "id": "bracePlacement",
                "category": "formattingStyle",
                "name": "代码块边界位置 (Block Delimiter Placement)",
                "descriptions": [
                        "块边界符有时贴在语句末尾，有时独占一行，同类块之间看不出规律",
                        "大多数块边界符贴在声明或条件行末尾，但少数长块会改为独占一行",
                        "函数、类、条件块的开头边界符基本都贴在同一行，垂直空间较紧凑",
                        "不同块类型各自有固定位置，例如声明块和控制块使用不同边界写法",
                        "开头边界符经常独占一行，代码块在上下边界更分明",
                        "所有可见块边界符都按同一位置规则排列，边界线条在垂直方向高度一致"
                ]
        },
        {
                "id": "optionalBlockBraces",
                "category": "formattingStyle",
                "name": "可选代码块大括号 (Optional Block Braces)",
                "descriptions": [
                        "单行条件或循环体经常直接跟随语句，代码中有许多无边界短块",
                        "多行块有边界符，单行块只有少数使用边界符，裸露短块较常见",
                        "单行块和多行块混合使用边界符，块边界可见度处于中间状态",
                        "大多数单行块也显示边界符，控制结构的起止位置较清楚",
                        "几乎所有可选块都有显式边界符，短块也有清楚的开合标记",
                        "所有可选块边界都可见，极短语句也使用统一的块写法"
                ]
        },
        {
                "id": "blankLineUsage",
                "category": "formattingStyle",
                "name": "空行使用 (Blank Line Usage)",
                "descriptions": [
                        "空行忽多忽少，代码有的粘连成团，有的被大段留白切断",
                        "顶层声明之间偶尔有空行，但函数内部和相邻块之间经常粘连",
                        "主要段落之间有空行，连续一行、两行或多行留白仍会混杂出现",
                        "相似结构之间的空行数量大体一致，代码段间距可预测",
                        "顶层、成员区和内部段落各自有稳定空行节奏，留白层级较清楚",
                        "同一文件内空行使用稳定，粘连块和连续多空行都很少出现"
                ]
        },
        {
                "id": "importLayout",
                "category": "formattingStyle",
                "name": "导入区排列 (Import Layout)",
                "descriptions": [
                        "导入语句散落在文件各处，和普通代码交错出现，顶部没有固定导入区",
                        "多数导入集中在顶部，但顺序和空行分组不稳定，仍夹杂零散导入",
                        "导入语句集中在文件顶部，分组较少，整体是一段连续清单",
                        "导入区域被空行分成几个清楚小组，每组内部排列方向大体一致",
                        "导入块位置、分组和组内排序在同类文件中重复出现，顶部轮廓稳定",
                        "导入区域排列规整，位置、空行、排序和多行导入缩进都高度一致"
                ]
        },
        {
                "id": "methodChainingFormat",
                "category": "formattingStyle",
                "name": "链式调用换行 (Method Chain Formatting)",
                "descriptions": [
                        "一连串调用压在同一行，点号或调用符号横向延伸成很长的线",
                        "长链偶尔换行，但同一行仍常塞入多个调用片段，断点位置摇摆",
                        "长链多数拆成多行，有的调用独占一行，有的仍与相邻调用同行",
                        "每个调用片段基本独占一行，但连接符前置和后置位置仍混杂",
                        "链式调用一行一个片段，连接符位置统一，缩进形成稳定竖列",
                        "所有链式调用块的换行、缩进、连接符位置和收尾行都使用同一种写法"
                ]
        },
        {
                "id": "trailingCommaUsage",
                "category": "formattingStyle",
                "name": "末项逗号使用 (Trailing Comma Usage)",
                "descriptions": [
                        "可见逗号分隔列表的最后一项后通常没有逗号，列表尾部显得干净截断",
                        "多行列表末项偶尔带逗号，同一文件内有带有不带的混合尾部",
                        "跨行数组、对象或参数列表的末项后多数可见逗号",
                        "所有跨行逗号分隔列表末项后都有逗号，单行列表通常没有",
                        "跨行列表稳定带末项逗号，单行短列表里也经常能看到末项逗号",
                        "所有可见逗号分隔列表无论单行或跨行，末项后都呈现逗号收尾"
                ]
        },
        {
                "id": "stringQuoteStyle",
                "category": "formattingStyle",
                "name": "字符串引号样式 (String Quote Style)",
                "descriptions": [
                        "普通字符串里单引号、双引号和模板式引号随机混用，分界不清",
                        "某一种引号明显占多数，但仍有不少其他引号穿插在普通字符串中",
                        "普通字符串几乎都使用同一种引号，只在内部字符冲突时切换",
                        "普通字符串与插值或多行字符串使用不同引号形态，分界大体可见",
                        "普通字符串、插值字符串和多行字符串各自有稳定引号规则",
                        "同一文件内字符串引号使用高度一致，普通、插值和块字符串的区别清楚"
                ]
        },
        {
                "id": "verticalAlignment",
                "category": "formattingStyle",
                "name": "纵向对齐方式 (Vertical Alignment)",
                "descriptions": [
                        "等号、冒号、行尾注释和对象字段各自贴近前文，纵向没有任何对齐列",
                        "局部相邻两三行偶尔对齐，但文件大部分仍按自然长度排列",
                        "短小表格式代码里能看到对齐列，普通声明和赋值仍不刻意对齐",
                        "对象字段、常量表或参数说明经常形成整齐的冒号、等号或注释列",
                        "多处声明区和配置区使用纵向对齐，等号、冒号或注释位置连续对齐",
                        "文件内凡是可成表的结构几乎都对齐，代码里排列明显表格化"
                ]
        },
        {
                "id": "listArgumentWrapping",
                "category": "formattingStyle",
                "name": "列表与参数换行 (List & Argument Wrapping)",
                "descriptions": [

    function clamp(v, min, max) { return Math.max(min, Math.min(max, Number(v))); }
    function getDim(id) { return dimensionsData.find(d => d.id === id); }
    function getSliderEl(id) { return document.getElementById(id + '-slider'); }
    function getValue(id) { return clamp(getSliderEl(id).value, 0, 5); }
    function updateUIFor(id) {
        const val = getValue(id);
        const valEl = document.getElementById(id + '-value');
        if (valEl) valEl.textContent = String(val);
        const dim = getDim(id);
        if (dim) {
            const descEl = document.getElementById(id + '-desc');
            if (descEl) descEl.textContent = dim.descriptions[val];
        }
    }
    function setSliderValue(id, value) {
        const el = getSliderEl(id);
        if (!el) return;
        el.value = clamp(value, 0, 5);
        updateUIFor(id);
    }

    function renderSliders() {
        categories.forEach(cat => {
            const headerDiv = document.createElement('div');
            headerDiv.className = 'category-header';
            headerDiv.textContent = cat.name;
            slidersGrid.appendChild(headerDiv);
            cat.dimensions.forEach(id => {
                const dim = getDim(id);
                if (!dim) return;
                const controlDiv = document.createElement('div');
                controlDiv.className = 'dimension-control';
                controlDiv.innerHTML =
                    '<div class="dimension-header">' +
                    '<label for="' + dim.id + '-slider">' + dim.name + '</label>' +
                    '<span class="value-display" id="' + dim.id + '-value">3</span>' +
                    '</div>' +
                    '<input type="range" id="' + dim.id + '-slider" name="' + dim.id + '" min="0" max="5" value="3" step="1">' +
                    '<p class="description-text" id="' + dim.id + '-desc">' + dim.descriptions[3] + '</p>';
                slidersGrid.appendChild(controlDiv);
            });
        });
    }

    function generateYaml() {
        let yaml = '[待优化的提示词 开始]# 你的代码风格\n\n量表统一：0-5 离散档，默认中位值3，便于用户微调一到两档即可感知差异。\n\n你的代码风格应满足如下设定（按分组展示）：\n\n';
        categories.forEach(cat => {
            yaml += '- 分组: "' + cat.name + '"\n';
            yaml += '  id: "' + cat.id + '"\n';
            yaml += '  维度:\n';
            cat.dimensions.forEach(id => {
                const dim = getDim(id);
                if (!dim) return;
                const slider = document.getElementById(dim.id + '-slider');
                if (!slider) return;
                const score = slider.value;
                const description = dim.descriptions[score];
                yaml += '    - 名称: "' + dim.name + '"\n';
                yaml += '      分数: ' + score + '\n';
                yaml += '      值说明: "' + description + '"\n';
            });
        });
        yaml += '\n\n[待优化的提示词 结束]\n\n重写为一段连续书写的提示词(不是结构化写作), 前缀为"你的Code个性是".\n\n';
        return yaml;
    }

    function updateYamlOutput() {
        yamlOutput.textContent = generateYaml();
    }

    function copyYaml() {
        navigator.clipboard.writeText(generateYaml()).then(() => {
            copyMessage.style.opacity = '1';
            setTimeout(() => { copyMessage.style.opacity = '0'; }, 2000);
        }).catch(err => {
            alert('复制失败，请手动复制。');
        });
    }


    function handleSliderInput(event) {
        if (event.target.type === 'range') {
            const id = event.target.name;
            updateUIFor(id);
            updateYamlOutput();
        }
    }

    const presetDisplayNames = {
        strict: '规约优先 (Convention First)',
        pragmatic: '实用平衡 (Pragmatic Balance)',
        prototype: '快速原型 (Rapid Prototyping)',
        library: '开源库作者 (Library Author)',
        enterprise: '企业级 (Enterprise Grade)',
        minimalist: '极简派 (Minimalist)',
        literate: '说明型作者 (Literate Author)'
    };

    function applyPreset(key) {
        const cfg = presets[key];
        if (!cfg) return;
        Object.entries(cfg).forEach(([id, val]) => {
            setSliderValue(id, val);
        });
        updateYamlOutput();
        updatePresetStatus(key);
    }

    function updatePresetStatus(key) {
        // Update active button
        document.querySelectorAll('.preset-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.quick-preset-btn').forEach(btn => btn.classList.remove('active'));
        const btnMap = { strict: 'presetStrict', pragmatic: 'presetPragmatic', prototype: 'presetPrototype', library: 'presetLibrary', enterprise: 'presetEnterprise', minimalist: 'presetMinimalist', literate: 'presetLiterate' };
        const quickBtnMap = { strict: 'quickPresetStrict', pragmatic: 'quickPresetPragmatic', prototype: 'quickPresetPrototype', library: 'quickPresetLibrary', enterprise: 'quickPresetEnterprise', minimalist: 'quickPresetMinimalist', literate: 'quickPresetLiterate' };
        const activeBtn = document.getElementById(btnMap[key]);
        if (activeBtn) activeBtn.classList.add('active');
        const activeQuickBtn = document.getElementById(quickBtnMap[key]);
        if (activeQuickBtn) activeQuickBtn.classList.add('active');
        // Update status text
        const statusEl = document.getElementById('presetStatus');
        if (statusEl) {
            const name = presetDisplayNames[key] || key;
            statusEl.textContent = '当前预设：' + name;
            statusEl.classList.remove('flash');
            void statusEl.offsetWidth;
            statusEl.classList.add('flash');
        }
    }

    // Init
    renderSliders();
    updateYamlOutput();

    slidersGrid.addEventListener('input', handleSliderInput);
    copyButton.addEventListener('click', copyYaml);

    document.getElementById('presetStrict').addEventListener('click', () => applyPreset('strict'));
    document.getElementById('presetPragmatic').addEventListener('click', () => applyPreset('pragmatic'));
    document.getElementById('presetPrototype').addEventListener('click', () => applyPreset('prototype'));
    document.getElementById('presetLibrary').addEventListener('click', () => applyPreset('library'));
    document.getElementById('presetEnterprise').addEventListener('click', () => applyPreset('enterprise'));
    document.getElementById('presetMinimalist').addEventListener('click', () => applyPreset('minimalist'));
    document.getElementById('presetLiterate').addEventListener('click', () => applyPreset('literate'));

    // Quick-preset copy buttons
    document.getElementById('quickPresetStrict').addEventListener('click', () => applyPreset('strict'));
    document.getElementById('quickPresetPragmatic').addEventListener('click', () => applyPreset('pragmatic'));
    document.getElementById('quickPresetPrototype').addEventListener('click', () => applyPreset('prototype'));
    document.getElementById('quickPresetLibrary').addEventListener('click', () => applyPreset('library'));
    document.getElementById('quickPresetEnterprise').addEventListener('click', () => applyPreset('enterprise'));
    document.getElementById('quickPresetMinimalist').addEventListener('click', () => applyPreset('minimalist'));
    document.getElementById('quickPresetLiterate').addEventListener('click', () => applyPreset('literate'));
